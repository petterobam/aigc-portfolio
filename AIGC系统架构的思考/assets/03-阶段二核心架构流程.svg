<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">

  <!-- Background -->
  <rect width="900" height="680" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#7dd3fc">阶段二核心架构：问答映射表 + 增量学习</text>
  <line x1="40" y1="56" x2="860" y2="56" stroke="#334155" stroke-width="1"/>

  <!-- 用户提问 -->
  <rect x="330" y="76" width="240" height="44" rx="10" fill="#0f2744" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="#93c5fd">👤 用户提问</text>

  <!-- arrow down -->
  <line x1="450" y1="120" x2="450" y2="148" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="450,152 444,140 456,140" fill="#475569"/>

  <!-- 查询记忆库 -->
  <rect x="290" y="152" width="320" height="44" rx="10" fill="#1e293b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="179" text-anchor="middle" font-size="13" fill="#c4b5fd">🔍 查询问答映射表（记忆库）</text>

  <!-- arrow down to diamond -->
  <line x1="450" y1="196" x2="450" y2="224" stroke="#475569" stroke-width="1.5"/>
  <polygon points="450,228 444,216 456,216" fill="#475569"/>

  <!-- Diamond -->
  <polygon points="450,228 540,268 450,308 360,268" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="273" text-anchor="middle" font-size="13" fill="#fbbf24">命中？</text>

  <!-- YES branch (left) -->
  <line x1="360" y1="268" x2="180" y2="268" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="176,268 188,262 188,274" fill="#22c55e"/>
  <text x="272" y="258" text-anchor="middle" font-size="11" fill="#22c55e">YES ✓</text>

  <rect x="60" y="248" width="116" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="118" y="273" text-anchor="middle" font-size="13" fill="#86efac">⚡ 直接返回</text>

  <!-- YES end label -->
  <text x="118" y="305" text-anchor="middle" font-size="11" fill="#4ade80">无需计算，极速响应</text>

  <!-- NO branch (right) -->
  <line x1="540" y1="268" x2="700" y2="268" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="704,268 692,262 692,274" fill="#ef4444"/>
  <text x="622" y="258" text-anchor="middle" font-size="11" fill="#ef4444">NO ✗</text>

  <rect x="704" y="248" width="156" height="40" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="782" y="273" text-anchor="middle" font-size="13" fill="#93c5fd">精确搜索 + LLM 总结</text>

  <!-- NO step 2: return -->
  <line x1="782" y1="288" x2="782" y2="328" stroke="#475569" stroke-width="1.5"/>
  <polygon points="782,332 776,320 788,320" fill="#475569"/>

  <rect x="704" y="332" width="156" height="40" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="782" y="357" text-anchor="middle" font-size="13" fill="#fbbf24">返回答案给用户</text>

  <!-- NO step 3: increment write -->
  <line x1="782" y1="372" x2="782" y2="412" stroke="#475569" stroke-width="1.5"/>
  <polygon points="782,416 776,404 788,404" fill="#475569"/>

  <rect x="684" y="416" width="196" height="40" rx="8" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="782" y="441" text-anchor="middle" font-size="13" fill="#c4b5fd">增量写入问答映射表</text>

  <!-- NO step 4: diverge -->
  <line x1="782" y1="456" x2="782" y2="496" stroke="#475569" stroke-width="1.5"/>
  <polygon points="782,500 776,488 788,488" fill="#475569"/>

  <rect x="664" y="500" width="236" height="40" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="782" y="525" text-anchor="middle" font-size="13" fill="#67e8f9">发散生成相关问题 + 预填答案</text>

  <!-- curve arrow back to memory store -->
  <path d="M 664 520 Q 530 540 450 480 Q 390 440 390 380 Q 390 300 400 280 Q 410 210 410 196" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="410,192 404,204 416,204" fill="#7c3aed"/>
  <text x="342" y="430" text-anchor="middle" font-size="11" fill="#7c3aed" transform="rotate(-70,342,430)">↩ 持续写入记忆库</text>

  <!-- Memory Store box at bottom center -->
  <rect x="270" y="580" width="360" height="52" rx="12" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="601" text-anchor="middle" font-size="12" fill="#a5b4fc">📦 问答映射表（记忆库）</text>
  <text x="450" y="621" text-anchor="middle" font-size="11" fill="#64748b">问题 → 答案  ·  持续增量更新</text>

  <!-- YES path down to memory store -->
  <line x1="118" y1="288" x2="118" y2="606" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="118" y1="606" x2="270" y2="606" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="274,606 262,600 262,612" fill="#22c55e"/>

  <!-- query arrow from memory store up (visual only, decorative) -->
  <line x1="580" y1="580" x2="580" y2="196" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,4" opacity="0.35"/>

</svg>
