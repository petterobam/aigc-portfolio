  <rect x="48" y="165" width="804" height="64" rx="10" fill="url(#grad-orchestrate)" stroke="#8b5cf6" stroke-width="1.4"/>
  <text x="74" y="188" font-size="11" font-weight="bold" fill="#a78bfa">L2  记忆编排层</text>
  <text x="74" y="205" font-size="11" fill="#c4b5fd">Memory Orchestration</text>
  <rect x="260" y="174" width="130" height="26" rx="5" fill="#1e1040" stroke="#8b5cf6" stroke-width="0.8"/>
