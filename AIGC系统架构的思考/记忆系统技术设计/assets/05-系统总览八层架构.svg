<svg viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">

  <defs>
    <marker id="arr-down" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
