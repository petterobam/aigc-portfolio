  <rect x="704" y="595" width="80" height="26" rx="5" fill="#1c0e02" stroke="#f97316" stroke-width="0.8"/>
  <text x="744" y="613" text-anchor="middle" font-size="11" fill="#fdba74">淘汰归档</text>

  <!-- arrow 7→8 -->
  <line x1="450" y1="650" x2="450" y2="664" stroke="#334155" stroke-width="1.5" marker-end="url(#arr-down)"/>

