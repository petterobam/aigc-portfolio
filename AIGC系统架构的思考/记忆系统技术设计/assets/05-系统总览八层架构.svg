  <text x="74" y="107" font-size="11" font-weight="bold" fill="#0ea5e9">L1  输入层</text>
  <text x="74" y="124" font-size="11" fill="#7dd3fc">Input Layer</text>
  <!-- chips -->
  <rect x="180" y="93" width="92" height="26" rx="5" fill="#0c2744" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="226" y="111" text-anchor="middle" font-size="11" fill="#7dd3fc">文档上传</text>
  <rect x="284" y="93" width="92" height="26" rx="5" fill="#0c2744" stroke="#0ea5e9" stroke-width="0.8"/>
