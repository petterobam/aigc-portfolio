  <rect x="362" y="595" width="100" height="26" rx="5" fill="#1c0e02" stroke="#f97316" stroke-width="0.8"/>
  <text x="412" y="613" text-anchor="middle" font-size="11" fill="#fdba74">去重归并</text>
  <rect x="476" y="595" width="100" height="26" rx="5" fill="#1c0e02" stroke="#f97316" stroke-width="0.8"/>
  <text x="526" y="613" text-anchor="middle" font-size="11" fill="#fdba74">版本管理</text>
  <rect x="590" y="595" width="100" height="26" rx="5" fill="#1c0e02" stroke="#f97316" stroke-width="0.8"/>
