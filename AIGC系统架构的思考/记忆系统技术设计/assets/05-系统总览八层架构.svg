  <rect x="212" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="252" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">问答主库</text>
  <rect x="304" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="344" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">候选库</text>
  <rect x="396" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="436" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">向量索引</text>
  <rect x="488" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="528" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">关系图谱</text>
  <rect x="580" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="620" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">事件队列</text>
  <rect x="672" y="676" width="80" height="26" rx="5" fill="#10102e" stroke="#6366f1" stroke-width="0.8"/>
  <text x="712" y="694" text-anchor="middle" font-size="11" fill="#a5b4fc">监控日志</text>

  <!-- 右侧纵向标注线 -->
  <line x1="862" y1="84" x2="862" y2="731" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="874" y="210" font-size="10" fill="#475569" transform="rotate(90,874,210)">在线路径 Online Path</text>
  <text x="874" y="530" font-size="10" fill="#475569" transform="rotate(90,874,530)">离线路径 Offline Path</text>

  <!-- 底部说明 -->
  <text x="450" y="758" text-anchor="middle" font-size="11" fill="#334155">数据流向：L1 输入 → L2 编排 → L3 路由 → L4 空间召回 → L5 Skill 处理 → L6 检索生成 → L7 评估治理 → L8 持久化</text>

