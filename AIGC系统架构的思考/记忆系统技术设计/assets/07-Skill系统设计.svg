<svg viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a855f7"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="860" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#e2e8f0">§6 · Skill 系统设计</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#475569">分类 · 版本化 · 与记忆空间的绑定关系</text>
  <line x1="60" y1="82" x2="1140" y2="82" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════
       TOP SECTION: 5 Skill 类型卡片
  ═══════════════════════════════════════════════ -->

  <!-- Skill 1: 问题生成 -->
  <rect x="60" y="104" width="196" height="196" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="60" y="104" width="196" height="44" rx="12" fill="#3b82f620"/>
  <rect x="60" y="132" width="196" height="16" fill="#3b82f620"/>
  <text x="158" y="132" text-anchor="middle" font-size="20">🔍</text>
  <text x="158" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa">问题生成 Skill</text>
  <text x="158" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#60a5fa"/>
  <text x="80" y="172" font-size="11" fill="#94a3b8">从原始资料发散问题</text>
  <text x="80" y="192" font-size="11" fill="#64748b">· 角色设定 → 1000 题</text>
  <text x="80" y="210" font-size="11" fill="#64748b">· 章节内容 → 10000 题</text>
  <text x="80" y="228" font-size="11" fill="#64748b">· 导演脚本 → 调度题</text>
  <rect x="80" y="270" width="156" height="22" rx="5" fill="#3b82f614" stroke="#3b82f6" stroke-width="1"/>
  <text x="158" y="285" text-anchor="middle" font-size="10" fill="#3b82f6">QuestionGenSkill</text>

  <!-- Skill 2: 问题归一化 -->
  <rect x="276" y="104" width="196" height="196" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="276" y="104" width="196" height="44" rx="12" fill="#8b5cf620"/>
  <rect x="276" y="132" width="196" height="16" fill="#8b5cf620"/>
  <text x="374" y="132" text-anchor="middle" font-size="20">🔗</text>
  <text x="374" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#a78bfa">问题归一化 Skill</text>
  <text x="296" y="172" font-size="11" fill="#94a3b8">不同说法归并为标准问题</text>
  <text x="296" y="192" font-size="11" fill="#64748b">· "第3次遇险是什么"</text>
  <text x="296" y="210" font-size="11" fill="#64748b">· "男主第3回陷危机"</text>
  <text x="296" y="228" font-size="11" fill="#64748b">→ 合并为同一问题簇</text>
  <rect x="296" y="270" width="156" height="22" rx="5" fill="#8b5cf614" stroke="#8b5cf6" stroke-width="1"/>
  <text x="374" y="285" text-anchor="middle" font-size="10" fill="#8b5cf6">QuestionNormSkill</text>

  <!-- Skill 3: 答案总结 -->
  <rect x="492" y="104" width="196" height="196" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="492" y="104" width="196" height="44" rx="12" fill="#06b6d420"/>
  <rect x="492" y="132" width="196" height="16" fill="#06b6d420"/>
  <text x="590" y="132" text-anchor="middle" font-size="20">✍️</text>
  <text x="590" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#67e8f9">答案总结 Skill</text>
  <text x="512" y="172" font-size="11" fill="#94a3b8">把检索材料压缩为高质答案</text>
  <text x="512" y="192" font-size="11" fill="#64748b">· 多来源内容融合</text>
  <text x="512" y="210" font-size="11" fill="#64748b">· 去冗余、保精华</text>
  <text x="512" y="228" font-size="11" fill="#64748b">· 保持领域表达风格</text>
  <rect x="512" y="270" width="156" height="22" rx="5" fill="#06b6d414" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="285" text-anchor="middle" font-size="10" fill="#06b6d4">AnswerSummarySkill</text>

  <!-- Skill 4: 问题扩散 -->
  <rect x="708" y="104" width="196" height="196" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="708" y="104" width="196" height="44" rx="12" fill="#f59e0b20"/>
  <rect x="708" y="132" width="196" height="16" fill="#f59e0b20"/>
  <text x="806" y="132" text-anchor="middle" font-size="20">🌿</text>
  <text x="806" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">问题扩散 Skill</text>
  <text x="728" y="172" font-size="11" fill="#94a3b8">围绕已知问题生成相邻问题</text>
  <text x="728" y="192" font-size="11" fill="#64748b">· 第3次遇险是什么？</text>
  <text x="728" y="210" font-size="11" fill="#64748b">· → 诱因/影响/伏笔？</text>
  <text x="728" y="228" font-size="11" fill="#64748b">· → 与第1次的对比？</text>
  <rect x="728" y="270" width="156" height="22" rx="5" fill="#f59e0b14" stroke="#f59e0b" stroke-width="1"/>
  <text x="806" y="285" text-anchor="middle" font-size="10" fill="#f59e0b">QuestionDiffuseSkill</text>

  <!-- Skill 5: 质量评分 -->
  <rect x="924" y="104" width="216" height="196" rx="12" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="924" y="104" width="216" height="44" rx="12" fill="#22c55e20"/>
  <rect x="924" y="132" width="216" height="16" fill="#22c55e20"/>
  <text x="1032" y="132" text-anchor="middle" font-size="20">⚖️</text>
  <text x="1032" y="148" text-anchor="middle" font-size="13" font-weight="bold" fill="#4ade80">质量评分 Skill</text>
  <text x="944" y="172" font-size="11" fill="#94a3b8">评估问答对是否入正式记忆</text>
  <text x="944" y="192" font-size="11" fill="#64748b">· 准确性 / 完整性</text>
  <text x="944" y="210" font-size="11" fill="#64748b">· 可复用性 / 去重度</text>
  <text x="944" y="228" font-size="11" fill="#64748b">· 领域相关性 / 价值</text>
  <rect x="944" y="270" width="176" height="22" rx="5" fill="#22c55e14" stroke="#22c55e" stroke-width="1"/>
  <text x="1032" y="285" text-anchor="middle" font-size="10" fill="#22c55e">QualityScoringSkill</text>

  <!-- ═══════════════════════════════════════════════
       MIDDLE SECTION: Skill 版本化结构
  ═══════════════════════════════════════════════ -->
  <line x1="60" y1="326" x2="1140" y2="326" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="600" y="354" text-anchor="middle" font-size="16" font-weight="bold" fill="#7dd3fc">Skill 版本化设计</text>
  <text x="600" y="374" text-anchor="middle" font-size="12" fill="#475569">每个 Skill 都是独立资产，支持版本管理、灰度发布、独立回滚</text>

  <!-- Skill 版本卡 -->
  <!-- Version card shared structure -->
  <!-- v_latest (active) -->
  <rect x="60" y="390" width="340" height="200" rx="12" fill="#0d1f12" stroke="#22c55e" stroke-width="2"/>
  <rect x="60" y="390" width="340" height="40" rx="12" fill="#22c55e22"/>
  <rect x="60" y="416" width="340" height="14" fill="#22c55e22"/>
  <text x="230" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#4ade80">v8  ·  当前线上版本（active）</text>
  <text x="80" y="444" font-size="11" fill="#94a3b8">prompt_template:  novel_v8_prompt.txt</text>
  <text x="80" y="462" font-size="11" fill="#94a3b8">domain_scope:     novel-writing</text>
  <text x="80" y="480" font-size="11" fill="#94a3b8">evaluation_metrics: coverage / score / adopt</text>
  <text x="80" y="498" font-size="11" fill="#94a3b8">rollout_strategy: 100% 全量</text>
  <text x="80" y="516" font-size="11" fill="#94a3b8">created_at:       2025-07-01</text>
  <rect x="80" y="532" width="260" height="46" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="210" y="551" text-anchor="middle" font-size="11" fill="#86efac">coverage ↑ 38% vs v6</text>
  <text x="210" y="568" text-anchor="middle" font-size="11" fill="#86efac">user adopt rate ↑ 12%</text>

  <!-- v_gray (灰度中) -->
  <rect x="430" y="390" width="340" height="200" rx="12" fill="#1a1400" stroke="#f59e0b" stroke-width="2"/>
  <rect x="430" y="390" width="340" height="40" rx="12" fill="#f59e0b22"/>
  <rect x="430" y="416" width="340" height="14" fill="#f59e0b22"/>
  <text x="600" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">v9  ·  灰度中（10% 流量）</text>
  <text x="450" y="444" font-size="11" fill="#94a3b8">prompt_template:  novel_v9_prompt.txt</text>
  <text x="450" y="462" font-size="11" fill="#94a3b8">domain_scope:     novel-writing</text>
  <text x="450" y="480" font-size="11" fill="#94a3b8">evaluation_metrics: coverage / score / adopt</text>
  <text x="450" y="498" font-size="11" fill="#94a3b8">rollout_strategy: 10% 灰度 → 待观察</text>
  <text x="450" y="516" font-size="11" fill="#94a3b8">created_at:       2025-07-18</text>
  <rect x="450" y="532" width="260" height="46" rx="8" fill="#1c1400" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="551" text-anchor="middle" font-size="11" fill="#fbbf24">coverage 持平，观察中...</text>
  <text x="580" y="568" text-anchor="middle" font-size="11" fill="#78716c">未达扩量阈值</text>

  <!-- v_deprecated -->
  <rect x="800" y="390" width="340" height="200" rx="12" fill="#161010" stroke="#52525b" stroke-width="1.5"/>
  <rect x="800" y="390" width="340" height="40" rx="12" fill="#52525b18"/>
  <rect x="800" y="416" width="340" height="14" fill="#52525b18"/>
  <text x="970" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#71717a">v7  ·  已弃用（deprecated）</text>
  <text x="820" y="444" font-size="11" fill="#52525b">prompt_template:  novel_v7_prompt.txt</text>
  <text x="820" y="462" font-size="11" fill="#52525b">domain_scope:     novel-writing</text>
  <text x="820" y="480" font-size="11" fill="#52525b">evaluation_metrics: coverage / score / adopt</text>
  <text x="820" y="498" font-size="11" fill="#52525b">rollout_strategy: 0% 已下线</text>
  <text x="820" y="516" font-size="11" fill="#52525b">deprecated_at:    2025-07-01</text>
  <rect x="820" y="532" width="260" height="46" rx="8" fill="#0f0f0f" stroke="#3f3f46" stroke-width="1"/>
  <text x="950" y="551" text-anchor="middle" font-size="11" fill="#52525b">被 v8 完全覆盖替代</text>
  <text x="950" y="568" text-anchor="middle" font-size="11" fill="#3f3f46">归档保留，可回滚</text>

  <!-- 版本流转箭头 -->
  <line x1="400" y1="490" x2="428" y2="490" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <line x1="770" y1="490" x2="798" y2="490" stroke="#475569" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <text x="414" y="483" text-anchor="middle" font-size="10" fill="#475569">升级</text>
  <text x="784" y="483" text-anchor="middle" font-size="10" fill="#475569">弃用</text>

  <!-- ═══════════════════════════════════════════════
       BOTTOM SECTION: Skill 与记忆空间绑定
  ═══════════════════════════════════════════════ -->
  <line x1="60" y1="614" x2="1140" y2="614" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="600" y="640" text-anchor="middle" font-size="16" font-weight="bold" fill="#7dd3fc">Skill 与记忆空间的绑定关系</text>
  <text x="600" y="660" text-anchor="middle" font-size="12" fill="#475569">不同记忆空间绑定不同 Skill 版本，同一输入在不同空间产出不同粒度的问题集</text>

  <!-- 绑定示意 -->
  <!-- Global Memory -->
  <rect x="60" y="676" width="220" height="64" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.2"/>
  <text x="170" y="699" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">🌐 Global Memory</text>
  <text x="170" y="718" text-anchor="middle" font-size="11" fill="#64748b">default_skill  v3</text>
  <text x="170" y="733" text-anchor="middle" font-size="11" fill="#475569">通用问题生成策略</text>

  <!-- Novel Domain -->
  <rect x="310" y="676" width="220" height="64" rx="10" fill="#0f1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="699" text-anchor="middle" font-size="12" font-weight="bold" fill="#60a5fa">📖 小说创作 Domain</text>
  <text x="420" y="718" text-anchor="middle" font-size="11" fill="#93c5fd">novel_skill  v8（active）</text>
  <text x="420" y="733" text-anchor="middle" font-size="11" fill="#475569">偏剧情/角色/伏笔</text>

  <!-- Director Domain -->
  <rect x="560" y="676" width="220" height="64" rx="10" fill="#1a0e1e" stroke="#a855f7" stroke-width="1.5"/>
  <text x="670" y="699" text-anchor="middle" font-size="12" font-weight="bold" fill="#c084fc">🎬 导演拍摄 Domain</text>
  <text x="670" y="718" text-anchor="middle" font-size="11" fill="#d8b4fe">director_skill  v4</text>
  <text x="670" y="733" text-anchor="middle" font-size="11" fill="#475569">偏镜头/调度/节奏</text>

  <!-- Project Memory -->
  <rect x="810" y="676" width="220" height="64" rx="10" fill="#0e1a10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="920" y="699" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">📁 某小说 Project</text>
  <text x="920" y="718" text-anchor="middle" font-size="11" fill="#4ade80">custom_skill  v2</text>
  <text x="920" y="733" text-anchor="middle" font-size="11" fill="#475569">覆盖项目私有问答策略</text>

  <!-- Arrows from skill cards to binding zones -->
  <!-- Q-Gen Skill → Novel Domain -->
  <path d="M 158 300 L 158 760 Q 158 776 174 776 L 308 776" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

  <!-- Q-Norm Skill → Director Domain -->
  <path d="M 374 300 L 374 776 Q 374 776 390 776 L 558 776" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>

  <!-- 底部说明 -->
  <rect x="60" y="764" width="1080" height="50" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="600" y="786" text-anchor="middle" font-size="12" fill="#475569">💡 同一段小说章节输入，在</text>
  <text x="600" y="804" text-anchor="middle" font-size="11" fill="#334155">小说创作领域 → novel_skill → 生成角色/剧情类问题 ｜ 导演拍摄领域 → director_skill → 生成镜头/调度类问题 ｜ 全局 → default_skill → 通用问题</text>

</svg>
