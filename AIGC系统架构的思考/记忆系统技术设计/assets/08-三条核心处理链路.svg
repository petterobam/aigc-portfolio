<svg viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#3b82f6"/></marker>
    <marker id="a-cyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#06b6d4"/></marker>
    <marker id="a-purple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#a855f7"/></marker>
    <marker id="a-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22c55e"/></marker>
    <marker id="a-amber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/></marker>
  </defs>

  <!-- bg -->
  <rect width="1400" height="860" fill="#0f1117"/>

  <!-- title -->
  <text x="700" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#e2e8f0">§7 · 三条核心处理链路</text>
  <line x1="60" y1="60" x2="1340" y2="60" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ─────────────── column headers ─────────────── -->
  <!-- col 1: 预处理 -->
  <rect x="60"   y="74" width="380" height="36" rx="8" fill="#06b6d418" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="250"  y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#06b6d4">链路 A · 预处理（数据入库）</text>

  <!-- col 2: 在线问答 -->
  <rect x="510"  y="74" width="380" height="36" rx="8" fill="#3b82f618" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="700"  y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">链路 B · 在线问答（实时响应）</text>

  <!-- col 3: 增量学习 -->
  <rect x="960"  y="74" width="380" height="36" rx="8" fill="#a855f718" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1150" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#a855f7">链路 C · 增量学习（未命中成长）</text>

  <!-- ══════════════════════════════════
       CHAIN A — 预处理
  ══════════════════════════════════ -->

  <!-- node helper: x=250, top=128, step=86 -->

  <!-- A1 -->
  <rect x="100" y="128" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="149" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">📥 原始资料输入</text>
  <text x="250" y="167" text-anchor="middle" font-size="11" fill="#475569">章节 / 设定 / 脚本 / 阐述 / 上传文件</text>
  <line x1="250" y1="180" x2="250" y2="204" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A2 -->
  <rect x="100" y="208" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="229" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">✂️ 切分 / 清洗 / 结构化</text>
  <text x="250" y="247" text-anchor="middle" font-size="11" fill="#475569">按段落、场景、章节粒度切分</text>
  <line x1="250" y1="260" x2="250" y2="284" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A3 -->
  <rect x="100" y="288" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="309" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">🗂 路由至目标记忆空间</text>
  <text x="250" y="327" text-anchor="middle" font-size="11" fill="#475569">选择所属领域 / 项目 / 全局</text>
  <line x1="250" y1="340" x2="250" y2="364" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A4 -->
  <rect x="100" y="368" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="389" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">🤖 调用 Question Generation Skill</text>
  <text x="250" y="407" text-anchor="middle" font-size="11" fill="#475569">生成 1k ~ 10k 个相关问题</text>
  <line x1="250" y1="420" x2="250" y2="444" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A5 -->
  <rect x="100" y="448" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="469" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">✍️ Answer Summary Skill</text>
  <text x="250" y="487" text-anchor="middle" font-size="11" fill="#475569">为每个问题生成高质量答案</text>
  <line x1="250" y1="500" x2="250" y2="524" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A6 -->
  <rect x="100" y="528" width="300" height="52" rx="10" fill="#0a2030" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="250" y="549" text-anchor="middle" font-size="12" fill="#67e8f9" font-weight="bold">⚖️ 评分 / 去重 / 筛选</text>
  <text x="250" y="567" text-anchor="middle" font-size="11" fill="#475569">Quality Score Skill 保留高置信问答对</text>
  <line x1="250" y1="580" x2="250" y2="604" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#a-cyan)"/>

  <!-- A7 -->
  <rect x="100" y="608" width="300" height="52" rx="10" fill="#14293d" stroke="#22c55e" stroke-width="1.8"/>
  <text x="250" y="629" text-anchor="middle" font-size="12" fill="#86efac" font-weight="bold">🗄️ 写入正式记忆库</text>
  <text x="250" y="647" text-anchor="middle" font-size="11" fill="#475569">问题 → 答案 · 命中索引</text>

  <!-- A badge -->
  <rect x="100" y="678" width="300" height="28" rx="6" fill="#06b6d412" stroke="#06b6d4" stroke-width="1"/>
  <text x="250" y="697" text-anchor="middle" font-size="11" fill="#67e8f9">异步批量执行 · 不影响线上响应</text>


  <!-- ══════════════════════════════════
       CHAIN B — 在线问答
  ══════════════════════════════════ -->

  <!-- B1 -->
  <rect x="510" y="128" width="380" height="52" rx="10" fill="#0f2744" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="700" y="149" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">👤 用户实时提问</text>
  <text x="700" y="167" text-anchor="middle" font-size="11" fill="#475569">任意格式 · 任意领域</text>
  <line x1="700" y1="180" x2="700" y2="204" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#a-blue)"/>

  <!-- B2 -->
  <rect x="510" y="208" width="380" height="52" rx="10" fill="#0f2744" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="700" y="229" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">🧠 Memory Router 构建 QueryPlan</text>
  <text x="700" y="247" text-anchor="middle" font-size="11" fill="#475569">领域识别 · 空间选择 · 优先级排序</text>
  <line x1="700" y1="260" x2="700" y2="284" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#a-blue)"/>

  <!-- B3 -->
  <rect x="510" y="288" width="380" height="52" rx="10" fill="#0f2744" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="700" y="309" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">🔍 多记忆空间并行召回</text>
  <text x="700" y="327" text-anchor="middle" font-size="11" fill="#475569">按优先级链查询 · 向量语义匹配</text>
  <line x1="700" y1="340" x2="700" y2="364" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#a-blue)"/>

  <!-- B4 diamond: 命中？ -->
  <polygon points="700,368 790,408 700,448 610,408" fill="#1e293b" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="700" y="404" text-anchor="middle" font-size="13" fill="#fbbf24" font-weight="bold">命中？</text>
  <text x="700" y="421" text-anchor="middle" font-size="11" fill="#78716c">置信度阈值判定</text>

  <!-- YES left -->
  <line x1="610" y1="408" x2="516" y2="408" stroke="#22c55e" stroke-width="1.5" marker-end="url(#a-green)"/>
  <text x="563" y="399" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="bold">YES</text>
  <rect x="510" y="448" width="196" height="48" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.8"/>
  <text x="608" y="468" text-anchor="middle" font-size="12" fill="#86efac" font-weight="bold">⚡ 直接返回答案</text>
  <text x="608" y="484" text-anchor="middle" font-size="11" fill="#4ade80">O(1) 极速响应</text>

  <!-- YES ↓ done -->
  <line x1="608" y1="496" x2="608" y2="524" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="608" y="538" text-anchor="middle" font-size="20" fill="#22c55e">✓</text>

  <!-- NO right -->
  <line x1="790" y1="408" x2="884" y2="408" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <text x="837" y="399" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">NO</text>
  <rect x="706" y="448" width="184" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="798" y="468" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">精确搜索</text>
  <text x="798" y="484" text-anchor="middle" font-size="11" fill="#475569">原始资料库检索</text>
  <line x1="798" y1="496" x2="798" y2="520" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#a-blue)"/>

  <!-- NO step2 -->
  <rect x="706" y="524" width="184" height="48" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="798" y="544" text-anchor="middle" font-size="12" fill="#93c5fd" font-weight="bold">LLM 总结答案</text>
  <text x="798" y="560" text-anchor="middle" font-size="11" fill="#475569">Answer Summary Skill</text>
  <line x1="798" y1="572" x2="798" y2="596" stroke="#3b82f6" stroke-width="1.4" marker-end="url(#a-blue)"/>

  <!-- NO step3: return -->
  <rect x="706" y="600" width="184" height="48" rx="8" fill="#0f2744" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="798" y="620" text-anchor="middle" font-size="12" fill="#fbbf24" font-weight="bold">返回答案给用户</text>
  <text x="798" y="636" text-anchor="middle" font-size="11" fill="#475569">同步响应</text>

  <!-- NO → 触发链路C -->
  <line x1="798" y1="648" x2="798" y2="678" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-purple)"/>
  <text x="798" y="674" text-anchor="middle" font-size="11" fill="#a855f7">触发链路 C ↓</text>

  <!-- B badge -->
  <rect x="510" y="724" width="380" height="28" rx="6" fill="#3b82f612" stroke="#3b82f6" stroke-width="1"/>
  <text x="700" y="743" text-anchor="middle" font-size="11" fill="#93c5fd">命中走左路 O(1) · 未命中走右路触发增量学习</text>


  <!-- ══════════════════════════════════
       CHAIN C — 增量学习
  ══════════════════════════════════ -->

  <!-- C1 -->
  <rect x="960" y="128" width="380" height="52" rx="10" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.4"/>
  <text x="1150" y="149" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">📬 记录未命中问题 + 上下文</text>
  <text x="1150" y="167" text-anchor="middle" font-size="11" fill="#475569">所属空间 · 来源 · 问题原文</text>
  <line x1="1150" y1="180" x2="1150" y2="204" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C2 -->
  <rect x="960" y="208" width="380" height="52" rx="10" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.4"/>
  <text x="1150" y="229" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">🔍 检索原始资料库</text>
  <text x="1150" y="247" text-anchor="middle" font-size="11" fill="#475569">定向检索相关文档片段</text>
  <line x1="1150" y1="260" x2="1150" y2="284" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C3 -->
  <rect x="960" y="288" width="380" height="52" rx="10" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.4"/>
  <text x="1150" y="309" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">✍️ 生成高质量答案</text>
  <text x="1150" y="327" text-anchor="middle" font-size="11" fill="#475569">Answer Summary Skill</text>
  <line x1="1150" y1="340" x2="1150" y2="364" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C4 -->
  <rect x="960" y="368" width="380" height="52" rx="10" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.4"/>
  <text x="1150" y="389" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">🌐 Question Diffusion Skill</text>
  <text x="1150" y="407" text-anchor="middle" font-size="11" fill="#475569">发散生成相邻问题簇</text>
  <line x1="1150" y1="420" x2="1150" y2="444" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C5 -->
  <rect x="960" y="448" width="380" height="52" rx="10" fill="#1a0e2e" stroke="#a855f7" stroke-width="1.4"/>
  <text x="1150" y="469" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">⚖️ 评分 / 筛选</text>
  <text x="1150" y="487" text-anchor="middle" font-size="11" fill="#475569">Quality Score Skill · 淘汰低质</text>
  <line x1="1150" y1="500" x2="1150" y2="524" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C6 候选层 -->
  <rect x="960" y="528" width="380" height="52" rx="10" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="1150" y="549" text-anchor="middle" font-size="12" fill="#c4b5fd" font-weight="bold">📦 写入候选记忆层</text>
  <text x="1150" y="567" text-anchor="middle" font-size="11" fill="#475569">Candidate Memory · 低门槛快速接收</text>
  <line x1="1150" y1="580" x2="1150" y2="604" stroke="#a855f7" stroke-width="1.4" marker-end="url(#a-purple)"/>

  <!-- C7 晋升正式 -->
  <rect x="960" y="608" width="380" height="52" rx="10" fill="#14293d" stroke="#22c55e" stroke-width="1.8"/>
  <text x="1150" y="629" text-anchor="middle" font-size="12" fill="#86efac" font-weight="bold">🏅 异步晋升正式记忆库</text>
  <text x="1150" y="647" text-anchor="middle" font-size="11" fill="#475569">Evaluation Service 评估通过后晋升</text>

  <!-- C8 反哺Skill -->
  <line x1="1150" y1="660" x2="1150" y2="688" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-amber)"/>
  <rect x="960" y="692" width="380" height="36" rx="8" fill="#2d1a0e" stroke="#f97316" stroke-width="1.2"/>
  <text x="1150" y="715" text-anchor="middle" font-size="12" fill="#fdba74" font-weight="bold">📈 更新 Skill 训练样本 · 触发迭代</text>

  <!-- C badge -->
  <rect x="960" y="744" width="380" height="28" rx="6" fill="#a855f712" stroke="#a855f7" stroke-width="1"/>
  <text x="1150" y="763" text-anchor="middle" font-size="11" fill="#c4b5fd">每一次未命中都是系统成长的来源</text>

  <!-- ── 链路 B NO 分支向右连接链路C的虚线 ── -->
  <path d="M 890 408 Q 930 408 960 154" fill="none" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- ── 底部总结条 ── -->
  <rect x="60" y="798" width="1280" height="44" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.2"/>
  <text x="700" y="815" text-anchor="middle" font-size="12" fill="#64748b">链路 A 负责"把资料变成记忆"·  链路 B 负责"实时命中或 fallback"·  链路 C 负责"把未知变成未来的已知"</text>
  <text x="700" y="833" text-anchor="middle" font-size="12" fill="#475569">三链路协同运转，驱动记忆系统持续自增长 🔄</text>

</svg>
