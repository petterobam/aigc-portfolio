<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="financeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="planGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="600" y="40" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565C0">财务部门长期财务规划智能辅助流程</text>
  
  <!-- 主流程 -->
  <!-- 数据采集 -->
  <rect x="50" y="80" width="160" height="80" rx="10" fill="url(#planGrad)" filter="url(#shadow)"/>
  <text x="130" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📊 数据采集</text>
  <text x="130" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">历史财务数据</text>
  
  <!-- 市场分析 -->
  <rect x="280" y="80" width="160" height="80" rx="10" fill="url(#planGrad)" filter="url(#shadow)"/>
  <text x="360" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📈 市场分析</text>
  <text x="360" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">行业趋势预测</text>
  
  <!-- 战略目标设定 -->
  <rect x="510" y="80" width="160" height="80" rx="10" fill="#FF6F00" filter="url(#shadow)"/>
  <text x="590" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">🎯 战略目标</text>
  <text x="590" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">3-5年规划</text>
  
  <!-- AI模型构建 -->
  <rect x="740" y="80" width="160" height="80" rx="10" fill="#9C27B0" filter="url(#shadow)"/>
  <text x="820" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">🤖 AI模型</text>
  <text x="820" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">预测分析</text>
  
  <!-- 资源配置 -->
  <rect x="970" y="80" width="160" height="80" rx="10" fill="url(#financeGrad2)" filter="url(#shadow)"/>
  <text x="1050" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">💼 资源配置</text>
  <text x="1050" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">智能优化</text>
  
  <!-- 箭头连接 -->
  <path d="M 210 120 L 280 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 440 120 L 510 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 670 120 L 740 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 900 120 L 970 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 反馈循环 -->
  <path d="M 1050 160 Q 1050 300, 590 300 Q 130 300, 130 160" stroke="#E91E63" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead2)"/>
  <text x="590" y="320" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#E91E63">🔄 动态调整循环</text>
  
  <!-- 子流程详情 -->
  <text x="50" y="370" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎯 核心功能模块</text>
  
  <!-- 预测精度提升 -->
  <rect x="50" y="400" width="250" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="175" y="425" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#1976D2">📈 预测准确率</text>
  <text x="175" y="445" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">75% → 85%，提升13%</text>
  
  <!-- 资源配置优化 -->
  <rect x="320" y="400" width="250" height="60" rx="8" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="445" y="425" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#388E3C">💼 资源配置</text>
  <text x="445" y="445" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">效率提升40%-60%</text>
  
  <!-- 风险防控 -->
  <rect x="590" y="400" width="250" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="715" y="425" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#F57C00">⚠️ 风险防控</text>
  <text x="715" y="445" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">决策质量提升60%-80%</text>
  
  <!-- 战略执行 -->
  <rect x="860" y="400" width="250" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="985" y="425" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#7B1FA2">🎯 战略执行</text>
  <text x="985" y="445" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">执行效率提升50%</text>
  
  <!-- 实施效果 -->
  <text x="50" y="520" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🚀 实施效果</text>
  
  <!-- 效果数据 -->
  <rect x="50" y="550" width="260" height="80" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="180" y="575" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565C0">📊 预测准确率</text>
  <text x="180" y="595" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">财务预测: 75% → 85%</text>
  <text x="180" y="615" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">提升幅度: 13%</text>
  
  <rect x="330" y="550" width="260" height="80" rx="10" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="460" y="575" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">💼 资源配置</text>
  <text x="460" y="595" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">资源配置效率提升</text>
  <text x="460" y="615" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">40%-60%</text>
  
  <rect x="610" y="550" width="260" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="740" y="575" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">⚠️ 决策质量</text>
  <text x="740" y="595" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">决策准确率提升</text>
  <text x="740" y="615" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">60%-80%</text>
  
  <rect x="890" y="550" width="260" height="80" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="1020" y="575" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#6A1B9A">🎯 战略执行</text>
  <text x="1020" y="595" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">执行效率提升</text>
  <text x="1020" y="615" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">50%</text>
  
  <!-- 应用场景 -->
  <text x="50" y="680" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎪 应用场景</text>
  
  <rect x="50" y="710" width="1100" height="80" rx="10" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="70" y="735" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">📊 财务预测:</text>
  <text x="70" y="755" font-family="Microsoft YaHei" font-size="12" fill="#666">3-5年财务规划、收入预测、成本趋势分析</text>
  
  <text x="590" y="735" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">🎯 战略规划:</text>
  <text x="590" y="755" font-family="Microsoft YaHei" font-size="12" fill="#666">资源配置、投资决策、风险管理</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>
</svg>