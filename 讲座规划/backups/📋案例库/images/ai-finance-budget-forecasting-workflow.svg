<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="financeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="40" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#1e3c72">财务部门AI辅助预算预测与优化流程</text>
  
  <!-- 主流程 -->
  <!-- 数据收集 -->
  <rect x="50" y="80" width="160" height="80" rx="10" fill="url(#financeGrad)" filter="url(#shadow)"/>
  <text x="130" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📊 历史数据收集</text>
  <text x="130" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">成本、收入、投资数据</text>
  
  <!-- 市场分析 -->
  <rect x="280" y="80" width="160" height="80" rx="10" fill="url(#financeGrad)" filter="url(#shadow)"/>
  <text x="360" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📈 市场趋势分析</text>
  <text x="360" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">行业基准、竞争分析</text>
  
  <!-- AI预测模型 -->
  <rect x="510" y="80" width="160" height="80" rx="10" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="590" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">🤖 AI预测模型</text>
  <text x="590" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">机器学习算法</text>
  
  <!-- 预算编制 -->
  <rect x="740" y="80" width="160" height="80" rx="10" fill="url(#financeGrad)" filter="url(#shadow)"/>
  <text x="820" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">💰 预算编制</text>
  <text x="820" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">智能分配资源</text>
  
  <!-- 验证优化 -->
  <rect x="970" y="80" width="160" height="80" rx="10" fill="#FF9800" filter="url(#shadow)"/>
  <text x="1050" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">✅ 验证优化</text>
  <text x="1050" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">ROI分析调整</text>
  
  <!-- 箭头连接 -->
  <path d="M 210 120 L 280 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 440 120 L 510 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 670 120 L 740 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 900 120 L 970 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 反馈循环 -->
  <path d="M 1050 160 Q 1050 250, 590 250 Q 130 250, 130 160" stroke="#E91E63" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead2)"/>
  <text x="590" y="270" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#E91E63">🔄 持续优化循环</text>
  
  <!-- 子流程详情 -->
  <text x="50" y="320" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎯 核心功能模块</text>
  
  <!-- 预测精度提升 -->
  <rect x="50" y="350" width="250" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="175" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#1976D2">📈 预测精度提升</text>
  <text x="175" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">准确率提升至95%+</text>
  
  <!-- 成本优化 -->
  <rect x="320" y="350" width="250" height="60" rx="8" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="445" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#388E3C">💰 成本结构优化</text>
  <text x="445" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">成本降低15-25%</text>
  
  <!-- 风险预警 -->
  <rect x="590" y="350" width="250" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="715" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#F57C00">⚠️ 风险预警机制</text>
  <text x="715" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">提前48-72小时预警</text>
  
  <!-- 决策支持 -->
  <rect x="860" y="350" width="250" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="985" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#7B1FA2">🎯 决策支持</text>
  <text x="985" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">ROI分析准确率90%+</text>
  
  <!-- 实施效果 -->
  <text x="50" y="470" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🚀 实施效果</text>
  
  <!-- 效果数据 -->
  <rect x="50" y="500" width="280" height="80" rx="10" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="190" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">⏱️ 时间效率</text>
  <text x="190" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">预算编制: 2周 → 3天</text>
  <text x="190" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">效率提升: 367%</text>
  
  <rect x="350" y="500" width="280" height="80" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="490" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565C0">📊 预测准确性</text>
  <text x="490" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">预算准确率: 80% → 95%+</text>
  <text x="490" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">误差率降低: 80%</text>
  
  <rect x="650" y="500" width="280" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="790" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">💰 成本节约</text>
  <text x="790" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">预算节约: 8-15%</text>
  <text x="790" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">运营成本降低: 30-50%</text>
  
  <rect x="950" y="500" width="220" height="80" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="1060" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#6A1B9A">🎯 ROI提升</text>
  <text x="1060" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">ROI提升: 25-35%</text>
  <text x="1060" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">回收期缩短: 40-60%</text>
  
  <!-- 应用场景 -->
  <text x="50" y="630" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎪 应用场景</text>
  
  <rect x="50" y="660" width="1100" height="120" rx="10" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="70" y="685" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">🎬 影视项目预算:</text>
  <text x="70" y="705" font-family="Microsoft YaHei" font-size="12" fill="#666">科幻大片、剧集、网剧的精准预算规划</text>
  
  <text x="70" y="725" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">💼 企业运营预算:</text>
  <text x="70" y="745" font-family="Microsoft YaHei" font-size="12" fill="#666">年度预算编制、季度调整、应急预算</text>
  
  <text x="590" y="685" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">📊 投资分析:</text>
  <text x="590" y="705" font-family="Microsoft YaHei" font-size="12" fill="#666">投资项目评估、风险分析、回报预测</text>
  
  <text x="590" y="725" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">🔄 动态调整:</text>
  <text x="590" y="745" font-family="Microsoft YaHei" font-size="12" fill="#666">实时监控、预算执行、偏差纠正</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>
</svg>