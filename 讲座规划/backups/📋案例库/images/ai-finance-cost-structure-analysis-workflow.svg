<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="costGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="analysisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F44336;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="600" y="40" font-family="Microsoft YaHei, Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#D32F2F">财务部门成本结构智能分析与优化流程</text>
  
  <!-- 主流程 -->
  <!-- 数据收集 -->
  <rect x="50" y="80" width="160" height="80" rx="10" fill="url(#analysisGrad)" filter="url(#shadow)"/>
  <text x="130" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📊 数据收集</text>
  <text x="130" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">全成本要素数据</text>
  
  <!-- 成本分析 -->
  <rect x="280" y="80" width="160" height="80" rx="10" fill="url(#analysisGrad)" filter="url(#shadow)"/>
  <text x="360" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">🔍 成本分析</text>
  <text x="360" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">结构识别</text>
  
  <!-- 机会识别 -->
  <rect x="510" y="80" width="160" height="80" rx="10" fill="#9C27B0" filter="url(#shadow)"/>
  <text x="590" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">🎯 机会识别</text>
  <text x="590" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">优化点发现</text>
  
  <!-- 方案制定 -->
  <rect x="740" y="80" width="160" height="80" rx="10" fill="#4CAF50" filter="url(#shadow)"/>
  <text x="820" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">💡 方案制定</text>
  <text x="820" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">分层优化策略</text>
  
  <!-- 实施监控 -->
  <rect x="970" y="80" width="160" height="80" rx="10" fill="url(#costGrad)" filter="url(#shadow)"/>
  <text x="1050" y="115" font-family="Microsoft YaHei" font-size="16" text-anchor="middle" fill="white">📈 实施监控</text>
  <text x="1050" y="140" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="white">效果追踪</text>
  
  <!-- 箭头连接 -->
  <path d="M 210 120 L 280 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 440 120 L 510 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 670 120 L 740 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 900 120 L 970 120" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- 反馈循环 -->
  <path d="M 1050 160 Q 1050 250, 590 250 Q 130 250, 130 160" stroke="#E91E63" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead2)"/>
  <text x="590" y="270" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#E91E63">🔄 持续优化循环</text>
  
  <!-- 子流程详情 -->
  <text x="50" y="320" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎯 核心功能模块</text>
  
  <!-- 成本降低 -->
  <rect x="50" y="350" width="250" height="60" rx="8" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="175" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#2E7D32">💰 成本降低</text>
  <text x="175" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">总成本降低15%-25%</text>
  
  <!-- 效率提升 -->
  <rect x="320" y="350" width="250" height="60" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="445" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#1565C0">⚡ 效率提升</text>
  <text x="445" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">运营效率提升30%-50%</text>
  
  <!-- 准确率提升 -->
  <rect x="590" y="350" width="250" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="715" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#E65100">🎯 准确率</text>
  <text x="715" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">成本控制准确率80%→95%</text>
  
  <!-- 回收期缩短 -->
  <rect x="860" y="350" width="250" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="985" y="375" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#7B1FA2">⏱️ 回收期</text>
  <text x="985" y="395" font-family="Microsoft YaHei" font-size="12" text-anchor="middle" fill="#666">投资回收期缩短40%-60%</text>
  
  <!-- 实施效果 -->
  <text x="50" y="470" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🚀 实施效果</text>
  
  <!-- 效果数据 -->
  <rect x="50" y="500" width="260" height="80" rx="10" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2"/>
  <text x="180" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D32">💰 成本节约</text>
  <text x="180" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">总成本降低</text>
  <text x="180" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">15%-25%</text>
  
  <rect x="330" y="500" width="260" height="80" rx="10" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="460" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565C0">⚡ 运营效率</text>
  <text x="460" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">运营效率提升</text>
  <text x="460" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">30%-50%</text>
  
  <rect x="610" y="500" width="260" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="740" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#E65100">🎯 控制精度</text>
  <text x="740" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">成本控制准确率</text>
  <text x="740" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">80%→95%</text>
  
  <rect x="890" y="500" width="260" height="80" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="1020" y="525" font-family="Microsoft YaHei" font-size="16" font-weight="bold" text-anchor="middle" fill="#6A1B9A">⏱️ 投资效率</text>
  <text x="1020" y="545" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">投资回收期</text>
  <text x="1020" y="565" font-family="Microsoft YaHei" font-size="14" text-anchor="middle" fill="#666">缩短40%-60%</text>
  
  <!-- 应用场景 -->
  <text x="50" y="630" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#333">🎪 应用场景</text>
  
  <rect x="50" y="660" width="1100" height="120" rx="10" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="70" y="685" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">📊 成本分析:</text>
  <text x="70" y="705" font-family="Microsoft YaHei" font-size="12" fill="#666">全成本要素分析、固定vs可变成本、直接vs间接成本</text>
  
  <text x="70" y="725" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">💡 优化机会:</text>
  <text x="70" y="745" font-family="Microsoft YaHei" font-size="12" fill="#666">流程优化、资源配置改进、技术升级、外包决策</text>
  
  <text x="590" y="685" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">🎯 分层优化:</text>
  <text x="590" y="705" font-family="Microsoft YaHei" font-size="12" fill="#666">战略层、战术层、操作层三级优化</text>
  
  <text x="590" y="725" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#666">📈 效果追踪:</text>
  <text x="590" y="745" font-family="Microsoft YaHei" font-size="12" fill="#666">实时监控、定期评估、动态调整</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E91E63"/>
    </marker>
  </defs>
</svg>