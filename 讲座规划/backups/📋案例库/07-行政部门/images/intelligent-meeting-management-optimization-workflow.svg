  <text x="225" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#7c3aed">⏰ 时间节约</text>
  <text x="225" y="715" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">平均每个会议节约3-4小时</text>
  <text x="225" y="735" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">年度节省会议时间1000+小时</text>
  
  <!-- 决策优化 -->
  <rect x="375" y="670" width="250" height="80" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="500" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">🎯 决策优化</text>
  <text x="500" y="715" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">决策准确率提升50%</text>
  <text x="500" y="735" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">决策质量提升45%</text>
  
  <!-- 团队协作 -->
  <rect x="650" y="670" width="250" height="80" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="775" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#047857">👥 团队协作</text>
  <text x="775" y="715" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#047857">团队协作效率提升75%</text>
  <text x="775" y="735" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#047857">沟通效果提升70%</text>
  
  <!-- 管理标准化 -->
  <rect x="925" y="670" width="225" height="80" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="1037" y="695" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#be185d">📋 标准化</text>
  <text x="1037" y="715" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#be185d">会议管理标准化+95%</text>
  <text x="1037" y="735" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#be185d">流程执行100%标准化</text>
  
  <!-- 核心优势总结 -->
  <text x="600" y="790" font-family="Microsoft YaHei, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">华策影视AIGC数字化转型方案 © 2026 | 影视剧组智能会议管理 | 年度节省1000+小时 | 决策质量+45% | 标准化+95%</text>
</svg>