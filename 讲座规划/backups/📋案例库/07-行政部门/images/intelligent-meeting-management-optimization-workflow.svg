  <text x="275" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">会议类型识别/参会人员分析/时间优化</text>
  <text x="275" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">议程设置/资源配置</text>
  
  <!-- 步骤2：会议准备 -->
  <rect x="550" y="160" width="350" height="100" rx="12" fill="url(#stepGradient2)" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="185" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#7c3aed">📂 2. 会议准备</text>
  <text x="725" y="205" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">预会通知/材料准备/设备调试</text>
  <text x="725" y="225" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7c3aed">预会检查/应急预案</text>
  
  <!-- 步骤3：会议执行 -->
  <rect x="100" y="320" width="350" height="100" rx="12" fill="url(#stepGradient3)" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="275" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#be185d">🎙️ 3. 会议执行</text>
  <text x="275" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#be185d">会议主持/内容记录/参与度监控</text>
  <text x="275" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#be185d">问题识别/决策跟踪</text>
  
  <!-- 步骤4：会议管理 -->
  <rect x="550" y="320" width="350" height="100" rx="12" fill="url(#stepGradient4)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="345" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1e40af">📄 4. 会议管理</text>
  <text x="725" y="365" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">会议纪要/行动项管理/效果评估</text>
  <text x="725" y="385" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">资料归档/反馈收集</text>
  
  <!-- 步骤5：持续优化 -->
  <rect x="325" y="480" width="350" height="100" rx="12" fill="url(#stepGradient5)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="505" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#047857">🔄 5. 持续优化</text>
  <text x="500" y="525" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#047857">效果分析/问题诊断/改进建议</text>
  <text x="500" y="545" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#047857">标准建立/持续改进</text>
  
  <!-- 连接箭头 -->
  <path d="M 450 210 L 550 210" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 725 260 L 725 290 L 275 290 L 275 320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 450 370 L 550 370" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 725 420 L 725 450 L 500 450 L 500 480" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  
  <!-- 应用场景 -->
  <rect x="50" y="620" width="1100" height="150" rx="15" fill="#ffffff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="650" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#374151">🎯 影视剧组会议管理价值</text>
  
  <!-- 时间节约 -->
