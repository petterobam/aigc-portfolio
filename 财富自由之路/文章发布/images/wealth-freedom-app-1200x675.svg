<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：绿色到蓝色渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27AE60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 渐变背景 -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- 主标题 -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    财富自由之路
  </text>

  <!-- 副标题 -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="36" fill="#E8F5E9" text-anchor="middle">
    个人财务软件开发实录
  </text>

  <!-- 简单的图表图标（简化版） -->
  <circle cx="1050" cy="575" r="100" fill="#FFFFFF" fill-opacity="0.1" />
  <path d="M 1000 600 L 1025 550 L 1050 570 L 1075 530 L 1100 520" stroke="#FFFFFF" stroke-width="5" fill-opacity="0.2" stroke-opacity="0.3" />
</svg>
